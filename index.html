<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRKP College 3D Campus Tour</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

header{
padding:20px;
}

img{
width:95%;
border-radius:15px;
margin-top:10px;
}

#viewer{
width:100%;
height:300px;
}

.section{
background:rgba(255,255,255,0.1);
margin:20px;
padding:15px;
border-radius:15px;
}
</style>
</head>

<body>

<header>
<h2>🎓 SRKP College Virtual 3D Tour</h2>
</header>

<!-- COLLEGE IMAGE -->
<div class="section">
<h3>College Building</h3>
<img src="college.jpg">
<div id="building3d"></div>
</div>

<!-- CLASSROOM -->
<div class="section">
<h3>Classroom 3D View</h3>
<div id="classroom3d"></div>
</div>

<!-- SCIENCE LAB -->
<div class="section">
<h3>Science Lab 3D View</h3>
<div id="lab3d"></div>
</div>

<!-- SEMINAR HALL -->
<div class="section">
<h3>Seminar Hall 3D View</h3>
<div id="hall3d"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
function create3D(id,color){

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/300,0.1,1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,300);
document.getElementById(id).appendChild(renderer.domElement);

const geometry = new THREE.BoxGeometry(2,1.5,2);
const material = new THREE.MeshBasicMaterial({color:color,wireframe:true});
const cube = new THREE.Mesh(geometry,material);
scene.add(cube);

camera.position.z=5;

function animate(){
requestAnimationFrame(animate);
cube.rotation.x+=0.01;
cube.rotation.y+=0.01;
renderer.render(scene,camera);
}
animate();
}

create3D("building3d",0x00c6ff);
create3D("classroom3d",0xffcc00);
create3D("lab3d",0xff0000);
create3D("hall3d",0x00ff00);

</script>

</body>
</html>
