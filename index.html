<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRKP College 3D Tour</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

header{
    padding:40px;
}

#viewer{
    width:100%;
    height:400px;
}

.card{
    width:90%;
    max-width:900px;
    margin:40px auto;
    padding:25px;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    backdrop-filter: blur(10px);
}

video{
    width:100%;
    border-radius:12px;
}
</style>
</head>

<body>

<header>
<h1>🎓 3D Virtual Campus Tour</h1>
<h2>SRKP Govt. P.G. College Kishangarh</h2>
</header>

<!-- 3D VIEWER -->
<div id="viewer"></div>

<!-- VIDEO SECTION -->
<div class="card">
<h2>Campus 3D Video Tour</h2>

<video controls autoplay loop muted>
<source src="college3d.mp4" type="video/mp4">
</video>

</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/400, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, 400);
document.getElementById("viewer").appendChild(renderer.domElement);

// building cube model
const geometry = new THREE.BoxGeometry(2,1.5,2);
const material = new THREE.MeshBasicMaterial({color: 0x00c6ff, wireframe:true});
const cube = new THREE.Mesh(geometry, material);

scene.add(cube);
camera.position.z = 5;

// animate
function animate(){
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
