<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SRKP 3D Walkable Campus</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#viewer{
width:100%;
height:100vh;
}

.menu{
position:fixed;
top:10px;
left:10px;
z-index:10;
}

button{
padding:10px;
margin:5px;
border:none;
background:#00c6ff;
color:white;
border-radius:5px;
}
</style>
</head>

<body>

<div class="menu">
<button onclick="loadCampus()">🏫 Campus</button>
<button onclick="loadClass()">📚 Classroom</button>
<button onclick="loadLab()">🧪 Science Lab</button>
<button onclick="loadHall()">🎤 Seminar Hall</button>
</div>

<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene,camera,renderer,cube;

function init(texture){
document.getElementById("viewer").innerHTML="";

scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

renderer=new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

const geometry=new THREE.BoxGeometry(10,5,10);
const loader=new THREE.TextureLoader();
const material=new THREE.MeshBasicMaterial({
map: loader.load(texture),
side:THREE.BackSide
});

cube=new THREE.Mesh(geometry,material);
scene.add(cube);

camera.position.set(0,0,0.1);

document.addEventListener("mousemove",e=>{
camera.rotation.y = -(e.clientX/window.innerWidth-0.5)*2;
camera.rotation.x = -(e.clientY/window.innerHeight-0.5)*1;
});

animate();
}

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

function loadCampus(){
init("college.jpg");
}

function loadClass(){
init("https://i.imgur.com/W5Q9bVf.jpg");
}

function loadLab(){
init("https://i.imgur.com/6o5V8Kx.jpg");
}

function loadHall(){
init("https://i.imgur.com/yY9G5xC.jpg");
}

loadCampus();
</script>

</body>
</html>
