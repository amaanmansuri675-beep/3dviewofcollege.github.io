<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRKP College 3D Virtual Tour</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* HEADER */
header{
    padding:60px 20px;
}

header h1{
    font-size:42px;
    text-shadow:0 10px 20px rgba(0,0,0,0.6);
}

/* 3D ROTATING BOX */
.scene{
    width:220px;
    height:220px;
    margin:40px auto;
    perspective:800px;
}

.cube{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation: rotate 12s infinite linear;
}

.cube div{
    position:absolute;
    width:220px;
    height:220px;
    background:rgba(255,255,255,0.1);
    border:2px solid white;
    line-height:220px;
    font-size:22px;
    font-weight:bold;
}

/* cube faces */
.front{ transform: translateZ(110px); }
.back{ transform: rotateY(180deg) translateZ(110px); }
.left{ transform: rotateY(-90deg) translateZ(110px); }
.right{ transform: rotateY(90deg) translateZ(110px); }
.top{ transform: rotateX(90deg) translateZ(110px); }
.bottom{ transform: rotateX(-90deg) translateZ(110px); }

@keyframes rotate{
    from{ transform: rotateX(0) rotateY(0); }
    to{ transform: rotateX(360deg) rotateY(360deg); }
}

/* GLASS CARD */
.card{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* VIDEO */
video{
    width:100%;
    border-radius:15px;
    margin-top:20px;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 30px;
    background:#00c6ff;
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.btn:hover{
    background:#0072ff;
}
</style>
</head>

<body>

<header>
    <h1>🎓 3D Virtual Tour</h1>
    <h2>SRKP Govt. P.G. College Kishangarh</h2>
</header>

<!-- 3D ROTATING MODEL -->
<div class="scene">
    <div class="cube">
        <div class="front">SRKP</div>
        <div class="back">College</div>
        <div class="left">Kishangarh</div>
        <div class="right">Virtual</div>
        <div class="top">3D</div>
        <div class="bottom">Tour</div>
    </div>
</div>

<!-- VIDEO SECTION -->
<div class="card">
    <h2>Campus 3D Model Video</h2>
    <p>Watch the virtual 3D campus model tour.</p>

    <!-- Replace with your video -->
    <video controls autoplay loop muted>
        <source src="college3d.mp4" type="video/mp4">
    </video>

    <a href="#" class="btn">Explore More</a>
</div>

</body>
</html>
